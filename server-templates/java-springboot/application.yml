# sEditor 图片上传后端模板 — Java (Spring Boot) 配置文件
# 放置于 src/main/resources/application.yml
# 所有项均可通过环境变量覆盖（Spring 自动 RELAXED_BINDING）

server:
  port: 8080
  # 生产建议反向代理后仅监听 127.0.0.1
  address: 127.0.0.1

spring:
  servlet:
    multipart:
      # 单文件大小上限（需覆盖最大允许的文件，即 upload.file-max-size）
      max-file-size: 20MB
      # 整个请求大小上限
      max-request-size: 21MB

upload:
  # 上传目录（绝对路径或相对路径，相对路径基于启动目录）
  dir: ./uploads
  # 图片单文件大小上限（字节）
  max-size: 5242880
  # 通用文件大小上限（字节，用于 /api/upload-file）
  file-max-size: 20971520
  # 静态资源访问 URL 前缀
  public-base: http://localhost:8080/uploads
  # 允许的 CORS 来源，逗号分隔
  cors-origins: http://localhost:5173
  # 上传鉴权 token，留空则不鉴权（仅开发用）
  token: ${UPLOAD_TOKEN:}
  # 每 IP 每分钟上传次数
  rate-limit: 10

logging:
  level:
    com.example.upload: INFO
    org.springframework.web: WARN
